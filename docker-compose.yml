services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chat-app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/chat_app
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-K9m2Qv8rT1xY6pL4sN7dF3hJ0wZ5cB8uM2qR6tV9yP4nX1kL7aS3dH8jF5pQ2rT6}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      PORT: ${PORT:-3000}
    networks:
      - chat-app
    volumes:
      - ./uploads:/app/uploads
    command: ["sh", "-c", "pnpm db:push && pnpm db:seed"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/chat_app
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-K9m2Qv8rT1xY6pL4sN7dF3hJ0wZ5cB8uM2qR6tV9yP4nX1kL7aS3dH8jF5pQ2rT6}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      PORT: ${PORT:-3000}
      DISABLE_RATE_LIMIT: ${DISABLE_RATE_LIMIT:-false}
    networks:
      - chat-app
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

networks:
  chat-app:

volumes:
  pg_data:
